name: Deploy

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/wlvumar/continium-backend
  FRONTEND_IMAGE: ghcr.io/wlvumar/continium-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u wlvumar --password-stdin

            docker network create continium || true

            # Backend
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker stop continium-backend || true
            docker rm continium-backend || true
            docker run -d \
              --name continium-backend \
              --network continium \
              --restart unless-stopped \
              -p 8000:8000 \
              -v continium_db:/data \
              --env-file /root/continium/.env \
              ${{ env.BACKEND_IMAGE }}:latest

            # Frontend
            docker pull ${{ env.FRONTEND_IMAGE }}:latest
            docker stop continium-frontend || true
            docker rm continium-frontend || true
            docker run -d \
              --name continium-frontend \
              --network continium \
              --restart unless-stopped \
              -p 80:80 \
              ${{ env.FRONTEND_IMAGE }}:latest

            docker image prune -f

