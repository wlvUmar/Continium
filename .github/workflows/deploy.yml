name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/wlvumar/continium-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u wlvumar --password-stdin
            docker pull ${{ env.IMAGE }}:latest
            docker stop continium-backend || true
            docker rm continium-backend || true
            docker run -d \
              --name continium-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              -v continium_db:/data \
              --env-file /root/continium/.env \
              ${{ env.IMAGE }}:latest
            docker image prune -f
