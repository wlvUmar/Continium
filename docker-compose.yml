services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: continium-backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - continium

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: continium-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - continium

volumes:
  db_data:

networks:
  continium:
